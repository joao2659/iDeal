<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
  <script src="assets/analytics.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contato — iDeal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F6F7FA; --paper:#FFFFFF; --navy:#131B3A; --coral:#FF5A3C;
  --ink:#14213D; --ink-soft:#5B6478; --line:#E3E6EE; --radius:20px;
  --shadow: 0 4px 24px rgba(19,27,58,0.06); font-size:16px;
}
*{box-sizing:border-box; margin:0; padding:0;}
body{background:var(--bg); color:var(--ink); font-family:'Inter',sans-serif;}
h1{font-family:'Space Grotesk',sans-serif; color:var(--navy);}
a{color:inherit; text-decoration:none;}
.wrap{max-width:600px; margin:0 auto; padding:0 24px;}
header.nav{position:sticky; top:0; z-index:100; background:rgba(246,247,250,0.9); backdrop-filter:blur(10px); border-bottom:1px solid var(--line);}
.nav-inner{max-width:1240px; margin:0 auto; padding:14px 24px; display:flex; align-items:center; justify-content:space-between;}
.logo{display:flex; align-items:center; gap:8px; font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:22px; color:var(--navy);}
.logo .dot{width:10px; height:10px; border-radius:50%; background:var(--coral); display:inline-block;}
.btn{padding:11px 22px; border-radius:999px; font-weight:600; font-size:14.5px; background:var(--coral); color:#fff; display:inline-flex; align-items:center;}
.page-head{padding:56px 0 20px; text-align:center;}
.page-head .kicker{font-family:'Space Grotesk',sans-serif; font-size:13px; font-weight:700; color:var(--coral); text-transform:uppercase; letter-spacing:.08em;}
.page-head h1{font-size:clamp(28px,4vw,42px); margin-top:10px;}
.contact-card{background:var(--paper); border:1px solid var(--line); border-radius:var(--radius); padding:32px; margin:30px 0 80px; box-shadow:var(--shadow); text-align:center;}
.contact-card p{color:var(--ink-soft); font-size:15px; line-height:1.7; margin-bottom:20px;}
.contact-email{display:inline-flex; align-items:center; gap:10px; background:var(--bg); border:1px solid var(--line); padding:14px 22px; border-radius:14px; font-weight:600; font-size:16px; color:var(--navy);}
footer{padding:40px 0; border-top:1px solid var(--line); text-align:center; font-size:13px; color:var(--ink-soft);}
</style>
</head>
<body>

<header class="nav">
  <div class="nav-inner">
    <a href="ideal-homepage.html" class="logo"><span class="dot"></span>iDeal</a>
    <a href="ideal-homepage.html" class="btn">Voltar ao início</a>
  </div>
</header>

<div class="page-head">
  <div class="wrap">
    <span class="kicker">Fale com a gente</span>
    <h1>Contato</h1>
  </div>
</div>

<div class="wrap">
  <div class="contact-card">
    <p>Tem alguma dúvida, sugestão ou precisa de suporte? Escreva para o nosso e-mail que respondemos o mais rápido possível.</p>
    <a href="mailto:idealoficial.br@gmail.com" class="contact-email">✉️ idealoficial.br@gmail.com</a>
  </div>
</div>

<footer>
  © 2026 iDeal. Todos os direitos reservados.
</footer>

</body>
</html>
