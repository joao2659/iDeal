<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<script src="assets/analytics.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mensagens — iDeal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F6F7FA; --paper:#FFFFFF; --navy:#131B3A; --navy-2:#1E2A56;
  --coral:#FF5A3C; --coral-dark:#E8432A; --gold:#F5A623; --mint:#1FAE8C;
  --ink:#14213D; --ink-soft:#5B6478; --line:#E3E6EE; --radius:18px;
  --shadow: 0 4px 24px rgba(19,27,58,0.06);
  font-size:16px;
}
*{box-sizing:border-box; margin:0; padding:0;}
body{background:var(--bg); color:var(--ink); font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; height:100vh; overflow:hidden;}
h1,h2,h3,h4{font-family:'Space Grotesk',sans-serif; color:var(--navy); letter-spacing:-0.01em;}
a{color:inherit; text-decoration:none;}
button,input{font-family:inherit; cursor:pointer; border:none;}
:focus-visible{outline:2px solid var(--coral); outline-offset:2px;}

header.nav{background:var(--paper); border-bottom:1px solid var(--line);}
.nav-inner{max-width:1320px; margin:0 auto; padding:14px 24px; display:flex; align-items:center; justify-content:space-between;}
.logo{display:flex; align-items:center; gap:8px; font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:22px; color:var(--navy);}
.logo .dot{width:10px; height:10px; border-radius:50%; background:var(--coral); display:inline-block;}
.avatar-nav{width:38px; height:38px; border-radius:50%; background:linear-gradient(135deg,var(--gold),var(--coral)); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700; font-size:14px; font-family:'Space Grotesk',sans-serif;}

.app-shell{max-width:1320px; margin:0 auto; height:calc(100vh - 68px); display:grid; grid-template-columns:340px 1fr; border-left:1px solid var(--line); border-right:1px solid var(--line);}
@media (max-width:860px){.app-shell{grid-template-columns:1fr;}}

/* CONVERSATION LIST */
.conv-list{border-right:1px solid var(--line); background:var(--paper); display:flex; flex-direction:column; overflow-y:auto;}
@media (max-width:860px){.conv-list.hidden-mobile{display:none;}}
.conv-list-head{padding:20px 20px 14px; border-bottom:1px solid var(--line);}
.conv-list-head h2{font-size:19px;}
.search-box{margin-top:12px; position:relative;}
.search-box input{width:100%; padding:10px 14px 10px 36px; border-radius:10px; background:var(--bg); border:1px solid var(--line); font-size:13.5px;}
.search-box .ic{position:absolute; left:12px; top:50%; transform:translateY(-50%); font-size:13px; color:var(--ink-soft);}

.conv-item{display:flex; gap:12px; padding:16px 20px; border-bottom:1px solid var(--bg); cursor:pointer; position:relative;}
.conv-item:hover{background:var(--bg);}
.conv-item.active{background:#FFF0EB;}
.conv-item.active::before{content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--coral);}
.avatar-sm{width:44px; height:44px; border-radius:50%; background:linear-gradient(135deg,var(--gold),var(--coral)); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700; font-size:15px; font-family:'Space Grotesk',sans-serif; flex-shrink:0;}
.conv-body{flex:1; min-width:0;}
.conv-top-row{display:flex; justify-content:space-between; align-items:center;}
.conv-name{font-weight:700; font-size:14.5px;}
.conv-time{font-size:11.5px; color:var(--ink-soft);}
.conv-context{font-size:11.5px; color:var(--coral-dark); font-weight:600; margin:3px 0; font-family:'IBM Plex Mono',monospace;}
.conv-preview{font-size:13px; color:var(--ink-soft); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.unread-dot{width:9px; height:9px; border-radius:50%; background:var(--coral); flex-shrink:0; margin-top:4px;}

/* CHAT PANE */
.chat-pane{display:flex; flex-direction:column; background:var(--bg);}
.chat-head{background:var(--paper); border-bottom:1px solid var(--line); padding:16px 24px; display:flex; align-items:center; gap:14px;}
.back-btn{display:none; background:none; font-size:18px; color:var(--ink-soft);}
@media (max-width:860px){.back-btn{display:block;}}
.chat-head-info{flex:1;}
.chat-head-name{font-weight:700; font-size:15px; display:flex; align-items:center; gap:6px;}
.verif{color:var(--mint); font-size:13px;}
.chat-head-sub{font-size:12px; color:var(--ink-soft);}
.chat-head .btn-icon{width:38px; height:38px; border-radius:50%; background:var(--bg); border:1px solid var(--line); display:flex; align-items:center; justify-content:center; font-size:14px;}

.request-banner{
  margin:16px 24px 0; background:var(--paper); border:1px solid var(--line); border-radius:14px; padding:14px 18px;
  display:flex; align-items:center; gap:14px; box-shadow:var(--shadow);
}
.request-banner .thumb{width:42px; height:42px; border-radius:10px; background:var(--bg); border:1px solid var(--line); display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0;}
.request-banner .info{flex:1;}
.request-banner .info b{font-size:13.5px; display:block;}
.request-banner .info span{font-size:12px; color:var(--ink-soft);}
.request-status{font-size:11px; font-weight:700; padding:5px 11px; border-radius:999px; text-transform:uppercase; background:#FFF3DC; color:#B27600;}

.messages{flex:1; overflow-y:auto; padding:24px; display:flex; flex-direction:column; gap:14px;}
.msg-row{display:flex; gap:10px; max-width:70%;}
.msg-row.mine{align-self:flex-end; flex-direction:row-reverse;}
.msg-avatar{width:30px; height:30px; border-radius:50%; background:linear-gradient(135deg,var(--gold),var(--coral)); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700; font-size:11px; font-family:'Space Grotesk',sans-serif; flex-shrink:0;}
.msg-bubble{background:var(--paper); border-radius:16px 16px 16px 4px; padding:12px 16px; font-size:14px; line-height:1.5; box-shadow:var(--shadow);}
.msg-row.mine .msg-bubble{background:var(--navy); color:#fff; border-radius:16px 16px 4px 16px;}
.msg-time{font-size:10.5px; color:var(--ink-soft); margin-top:4px; display:block;}
.msg-row.mine .msg-time{text-align:right;}
.day-divider{text-align:center; font-size:11.5px; color:var(--ink-soft); font-weight:600; margin:8px 0;}

.chat-input-bar{background:var(--paper); border-top:1px solid var(--line); padding:16px 24px; display:flex; gap:12px; align-items:center;}
.chat-input-bar input{flex:1; padding:13px 16px; border-radius:999px; background:var(--bg); border:1px solid var(--line); font-size:14px;}
.send-btn{width:44px; height:44px; border-radius:50%; background:var(--coral); color:#fff; font-size:16px; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
.attach-btn{width:40px; height:40px; border-radius:50%; background:var(--bg); border:1px solid var(--line); font-size:15px; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
.report-link{font-size:11.5px; color:var(--ink-soft); text-align:center; padding:8px 24px 0; }
.report-link a{color:var(--ink-soft); font-weight:600;}
.report-link a:hover{color:var(--coral-dark);}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<header class="nav">
  <div class="nav-inner">
    <a href="ideal-homepage.html" class="logo"><span class="dot"></span>iDeal</a>
    <div class="avatar-nav">M</div>
  </div>
</header>

<div class="app-shell">
  <!-- CONVERSATION LIST -->
  <div class="conv-list" id="convList">
    <div class="conv-list-head">
      <h2>Mensagens</h2>
      <div class="search-box">
        <span class="ic">🔍</span>
        <input type="text" placeholder="Buscar conversas">
      </div>
    </div>

    <div id="convItemsContainer">
      <p style="color:var(--ink-soft); font-size:13.5px; padding:20px;">Carregando conversas…</p>
    </div>
  </div>

  <!-- CHAT PANE -->
  <div class="chat-pane" id="chatPane">
    <div id="chatEmptyState" style="display:flex; align-items:center; justify-content:center; height:100%; color:var(--ink-soft); font-size:14px; text-align:center; padding:40px;">
      Selecione uma conversa à esquerda para ver as mensagens.
    </div>

    <div id="chatActiveArea" style="display:none; flex-direction:column; height:100%;">
      <div class="chat-head">
        <button class="back-btn" onclick="backToList()">←</button>
        <div class="avatar-sm" id="chatAvatar">?</div>
        <div class="chat-head-info">
          <div class="chat-head-name" id="chatName">—</div>
          <div class="chat-head-sub" id="chatSub"></div>
        </div>
        <button class="btn-icon" title="Denunciar conversa">🚩</button>
      </div>

      <div class="request-banner" id="requestBanner" style="display:none;">
        <div class="thumb">📦</div>
        <div class="info"><b id="reqProductName">—</b><span id="reqMeta"></span></div>
        <span class="request-status" id="reqStatus"></span>
      </div>

      <div class="messages" id="messagesArea"></div>

     <div class="report-link">Conversas na iDeal ficam vinculadas a uma viagem ou solicitação. <a href="#">Denunciar</a> se algo parecer errado. · <a href="#" onclick="openDisputeModal(); return false;" style="color:var(--coral-dark); font-weight:700;">Abrir disputa</a></div>

      <div id="disputeModal" style="display:none; position:fixed; inset:0; background:rgba(19,27,58,0.5); z-index:200; align-items:center; justify-content:center; padding:20px;">
        <div style="background:var(--paper); border-radius:18px; padding:28px; max-width:420px; width:100%;">
          <h3 style="margin-bottom:6px;">Abrir disputa</h3>
          <p style="font-size:13px; color:var(--ink-soft); margin-bottom:18px;">Nossa equipe vai analisar e mediar essa negociação.</p>
          <label style="display:block; font-size:13px; font-weight:600; margin-bottom:6px;">Motivo</label>
          <select id="disputeReason" style="width:100%; padding:10px; border-radius:10px; border:1px solid var(--line); margin-bottom:14px;">
            <option value="produto_nao_entregue">Produto não foi entregue</option>
            <option value="produto_diferente">Produto diferente do combinado</option>
            <option value="pagamento_nao_recebido">Pagamento não recebido</option>
            <option value="comunicacao">Problema de comunicação</option>
            <option value="outro">Outro</option>
          </select>
          <label style="display:block; font-size:13px; font-weight:600; margin-bottom:6px;">Descreva o que aconteceu</label>
          <textarea id="disputeDescription" rows="4" style="width:100%; padding:10px; border-radius:10px; border:1px solid var(--line); margin-bottom:16px; font-family:inherit;"></textarea>
          <div style="display:flex; gap:10px;">
            <button style="flex:1; padding:11px; border-radius:10px; background:var(--bg); border:1px solid var(--line); font-weight:600; cursor:pointer;" onclick="closeDisputeModal()">Cancelar</button>
            <button style="flex:1; padding:11px; border-radius:10px; background:var(--coral-dark); color:#fff; font-weight:600; cursor:pointer; border:none;" onclick="submitDispute()">Abrir disputa</button>
          </div>
          <p id="disputeMsg" style="font-size:12.5px; margin-top:10px; text-align:center;"></p>
        </div>
      </div>
      <div class="chat-input-bar">
        <button class="attach-btn">📎</button>
        <input type="text" id="messageInput" placeholder="Escreva uma mensagem...">
        <button class="send-btn" id="sendBtn">➤</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/supabase-client.js"></script>
<script src="assets/data.js"></script>
<script>
let currentUser = null;
let activeConversationId = null;
let activeOtherUserId = null;
let activeRequestId = null;
let messagesChannel = null;

function timeAgo(dateStr) {
  const diff = Date.now() - new Date(dateStr).getTime();
  const h = diff / 3600000;
  if (h < 1) return 'agora';
  if (h < 24) return `${Math.floor(h)}h`;
  const d = Math.floor(h / 24);
  return d === 1 ? '1 dia' : `${d} dias`;
}

function formatTime(dateStr) {
  return new Date(dateStr).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
}

async function loadConversations() {
  currentUser = await idealGetCurrentUser();
  if (!currentUser) {
    window.location.href = 'ideal-entrar.html';
    return;
  }

  const { data: requests } = await idealSupabase
    .from('requests')
    .select('*, conversation:conversations(id), buyer:buyer_id(first_name), traveler:traveler_id(first_name), trip:trip_id(origin_city, destination_city, departure_date)')
    .or(`buyer_id.eq.${currentUser.id},traveler_id.eq.${currentUser.id}`)
    .order('created_at', { ascending: false });

  const container = document.getElementById('convItemsContainer');

  const withConv = (requests || []).filter(r => r.conversation && r.conversation.length);
  if (!withConv.length) {
    container.innerHTML = `<p style="color:var(--ink-soft); font-size:13.5px; padding:24px; text-align:center;">Nenhuma conversa ainda. Elas aparecem aqui quando você envia ou recebe uma solicitação.</p>`;
    return;
  }

  container.innerHTML = withConv.map(r => {
    const isBuyer = r.buyer_id === currentUser.id;
    const otherName = isBuyer ? (r.traveler?.first_name || 'Viajante') : (r.buyer?.first_name || 'Comprador');
    const otherId = isBuyer ? r.traveler_id : r.buyer_id;
    const conv = r.conversation[0];
    const route = r.trip ? `${(r.trip.origin_city||'').slice(0,3).toUpperCase()} → ${(r.trip.destination_city||'').slice(0,3).toUpperCase()}` : '';
    return `
      <div class="conv-item" data-conv-id="${conv.id}" data-other-id="${otherId}" data-other-name="${otherName}"
           data-request-id="${r.id}"
           data-route="${route}" data-departure="${r.trip?.departure_date||''}" data-product="${r.product_name||''}"
           data-reward="${r.offered_reward||''}" data-delivery="${r.delivery_city||''}" data-status="${r.request_status||''}"
           onclick="openChat(this)">
        <div class="avatar-sm">${idealInitial(otherName)}</div>
        <div class="conv-body">
          <div class="conv-top-row"><span class="conv-name">${otherName}</span><span class="conv-time">${timeAgo(r.created_at)}</span></div>
          <div class="conv-context">${route} · ${r.product_name || ''}</div>
          <div class="conv-preview">Toque para ver a conversa</div>
        </div>
      </div>
    `;
  }).join('');
}

async function openChat(el){
  document.querySelectorAll('.conv-item').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');

 activeConversationId = el.dataset.convId;
  activeOtherUserId = el.dataset.otherId;
  activeRequestId = el.dataset.requestId;

  document.getElementById('chatEmptyState').style.display = 'none';
  document.getElementById('chatActiveArea').style.display = 'flex';

  document.getElementById('chatAvatar').textContent = idealInitial(el.dataset.otherName);
  document.getElementById('chatName').textContent = el.dataset.otherName;
  document.getElementById('chatSub').textContent = `${el.dataset.route} · ${idealFormatDateShort(el.dataset.departure)}`;

  if (el.dataset.product) {
    document.getElementById('requestBanner').style.display = 'flex';
    document.getElementById('reqProductName').textContent = el.dataset.product;
    document.getElementById('reqMeta').textContent = `Recompensa: R$ ${el.dataset.reward||0} · Entrega em ${el.dataset.delivery||'—'}`;
    document.getElementById('reqStatus').textContent = el.dataset.status;
  }

  await loadMessages();
  subscribeToMessages();

  if(window.innerWidth <= 860){
    document.getElementById('convList').classList.add('hidden-mobile');
  }
}

function backToList(){
  document.getElementById('convList').classList.remove('hidden-mobile');
}

async function loadMessages() {
  const { data: messages } = await idealSupabase
    .from('messages')
    .select('*')
    .eq('conversation_id', activeConversationId)
    .order('created_at', { ascending: true });

  renderMessages(messages || []);
}

function renderMessages(messages) {
  const area = document.getElementById('messagesArea');
  if (!messages.length) {
    area.innerHTML = `<p style="color:var(--ink-soft); font-size:13.5px; text-align:center; margin-top:20px;">Nenhuma mensagem ainda. Diga oi!</p>`;
    return;
  }
  area.innerHTML = messages.map(m => {
    const mine = m.sender_id === currentUser.id;
    return `
      <div class="msg-row ${mine ? 'mine' : ''}">
        <div class="msg-avatar">${mine ? idealInitial('Você') : '?'}</div>
        <div>
          <div class="msg-bubble">${m.message_text}</div>
          <span class="msg-time">${formatTime(m.created_at)}</span>
        </div>
      </div>
    `;
  }).join('');
  area.scrollTop = area.scrollHeight;
}

function subscribeToMessages() {
  if (messagesChannel) idealSupabase.removeChannel(messagesChannel);
  messagesChannel = idealSupabase
    .channel(`messages-${activeConversationId}`)
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `conversation_id=eq.${activeConversationId}` },
      () => loadMessages())
    .subscribe();
}

document.getElementById('sendBtn').addEventListener('click', sendMessage);
document.getElementById('messageInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(); });

async function sendMessage() {
  const input = document.getElementById('messageInput');
  const text = input.value.trim();
  if (!text || !activeConversationId) return;
  input.value = '';

  await idealSupabase.from('messages').insert({
    conversation_id: activeConversationId,
    sender_id: currentUser.id,
    message_text: text,
  });

  if (activeOtherUserId) {
    await idealSupabase.from('notifications').insert({
      user_id: activeOtherUserId,
      type: 'mensagem',
      message: 'Você recebeu uma nova mensagem.',
      link: 'ideal-mensagens.html'
    });
  }

  await loadMessages();
}

function openDisputeModal() {
  if (!activeRequestId) { alert('Selecione uma conversa vinculada a uma solicitação primeiro.'); return; }
  document.getElementById('disputeModal').style.display = 'flex';
}

function closeDisputeModal() {
  document.getElementById('disputeModal').style.display = 'none';
}

async function submitDispute() {
  const reason = document.getElementById('disputeReason').value;
  const description = document.getElementById('disputeDescription').value.trim();
  const msg = document.getElementById('disputeMsg');

  if (!description) {
    msg.textContent = 'Descreva o que aconteceu antes de enviar.';
    msg.style.color = 'var(--coral-dark)';
    return;
  }

  const { error } = await idealSupabase.from('disputes').insert({
    request_id: activeRequestId,
    opened_by: currentUser.id,
    against_user_id: activeOtherUserId,
    reason: reason,
    description: description
  });

  if (error) {
    msg.textContent = 'Erro ao abrir disputa: ' + error.message;
    msg.style.color = 'var(--coral-dark)';
    return;
  }

  msg.textContent = 'Disputa aberta! Nossa equipe vai analisar em breve.';
  msg.style.color = 'var(--mint)';
  setTimeout(closeDisputeModal, 1800);
}

loadConversations();
</script>
</body>
</html>
